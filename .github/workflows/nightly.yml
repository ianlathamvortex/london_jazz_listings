name: Nightly Jazz Scraper

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: ''

      - name: Install
        run: pip install requests beautifulsoup4 lxml anthropic python-dateutil

      - name: Scrape
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run_all.py

      - name: Commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Jazz Scraper Bot"
          git add data/
          git diff --staged --quiet || git commit -m "Auto: nightly scrape $(date +'%Y-%m-%d')"
          git push
- name: Copy data files to repo root (for Netlify)
        run: cp data/*.json 
