name: Nightly Jazz Scraper

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: ''
      - name: Install Python packages
        run: pip install requests beautifulsoup4 lxml anthropic python-dateutil playwright
      - name: Install Chromium
        run: playwright install chromium --with-deps
      - name: Scrape
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run_all.py
      - name: Pre-render gigs.html for SEO
        run: python prerender.py
      - name: Copy data to root
        run: cp data/*.json .
      - name: Pre-render gigs.html
        run: python prerender.py
      - name: Update sitemap lastmod
        run: |
          python3 -c "
import re, datetime
today = datetime.date.today().isoformat()
with open('sitemap.xml') as f:
    s = f.read()
s = re.sub(r'<lastmod>[0-9-]+</lastmod>', '<lastmod>' + today + '</lastmod>', s)
with open('sitemap.xml', 'w') as f:
    f.write(s)
print('sitemap.xml lastmod ->', today)
"
      - name: Commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Jazz Scraper Bot"
          git add -A
          git diff --staged --quiet || git commit -m "Auto: nightly scrape $(date +'%Y-%m-%d')"
          git push
