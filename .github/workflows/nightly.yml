name: Nightly Jazz Scraper

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: ''
      - name: Install Python packages
        run: pip install requests beautifulsoup4 lxml anthropic python-dateutil playwright
      - name: Install Chromium
        run: playwright install chromium --with-deps
      - name: Scrape
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run_all.py
      - name: Copy data to root
        run: cp data/*.json .
      - name: Pre-render gigs.html
        run: python prerender.py
      - name: Deduplicate gigs
        run: python dedup.py
      - name: Check venue coverage
        id: coverage
        run: |
          python coverage_check.py && echo "coverage_ok=true" >> $GITHUB_OUTPUT || echo "coverage_ok=false" >> $GITHUB_OUTPUT
        continue-on-error: true
      - name: Update sitemap lastmod
        run: python update_sitemap.py
      - name: Open issue if coverage gaps found
        if: steps.coverage.outputs.coverage_ok == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list --label "coverage-gap" --state open --json number --jq length)
          if [ "$EXISTING" = "0" ]; then
            gh issue create \
              --title "⚠️ Coverage gaps detected $(date +'%Y-%m-%d')" \
              --body "$(cat coverage_report.md)" \
              --label "coverage-gap"
          else
            echo "Coverage gap issue already open — skipping"
          fi
      - name: Close coverage issue if gaps resolved
        if: steps.coverage.outputs.coverage_ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue list --label "coverage-gap" --state open --json number --jq '.[].number' | \
          xargs -I{} gh issue close {} --comment "Coverage gaps resolved ✓"
      - name: Commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Jazz Scraper Bot"
          git add -A
          git diff --staged --quiet || if [ "${{ steps.coverage.outputs.coverage_ok }}" = "false" ]; then
            git commit -m "Auto: nightly scrape $(date +'%Y-%m-%d') ⚠️ COVERAGE GAPS — check coverage_report.md"
          else
            git commit -m "Auto: nightly scrape $(date +'%Y-%m-%d')"
          fi
          git pull --rebase origin main
          git push
