<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jazz Gigs London — Upcoming Concerts | The London Jazz List</title>
  <meta name="description" content="Upcoming jazz gigs across London — Ronnie Scott's, Vortex, Barbican, Cadogan Hall, 606 Club, Ladbroke Hall and more. Filter by date, zone and genre. Updated every night.">
  <meta name="keywords" content="jazz gigs london, jazz london tonight, jazz concerts london, jazz london this weekend, ronnie scotts listings, vortex jazz club, 606 club jazz, barbican jazz, jazz soho, jazz dalston, jazz north london, jazz south london, bebop london, contemporary jazz london, big band london, latin jazz london">
  <link rel="canonical" href="https://londonjazzlist.co.uk/gigs.html">

  <!-- Open Graph -->
  <meta property="og:title" content="Jazz Gigs London — Upcoming Concerts | The London Jazz List">
  <meta property="og:description" content="Upcoming jazz gigs across London — Ronnie Scott's, Vortex, Barbican, Cadogan Hall, 606 Club, Ladbroke Hall and more. Filter by date, zone and genre. Updated every night.">
  <meta property="og:url" content="https://londonjazzlist.co.uk/gigs.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="The London Jazz List">
  <meta property="og:locale" content="en_GB">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Jazz Gigs London — Upcoming Concerts | The London Jazz List">
  <meta name="twitter:description" content="Upcoming jazz gigs across London — Ronnie Scott's, Vortex, Barbican, Cadogan Hall, 606 Club, Ladbroke Hall and more. Filter by date, zone and genre. Updated every night.">

  <!-- Geo -->
  <meta name="geo.region" content="GB-LND">
  <meta name="geo.placename" content="London">

  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Pre-rendered static cards — visible to Google, hidden once JS loads */
    body.js-loaded #listings > .date-group { display: none; }
  </style>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ItemList",
    "name": "London Jazz Gigs",
    "description": "Upcoming jazz concerts and gigs across London — Ronnie Scott's, Vortex, Barbican, Cadogan Hall and more",
    "url": "https://londonjazzlist.co.uk/gigs.html",
    "numberOfItems": "100+",
    "itemListElement": {
      "@type": "MusicEvent",
      "location": {
        "@type": "City",
        "name": "London",
        "addressCountry": "GB"
      }
    }
  }
  </script>

</head>
<body>

  <div id="header"></div>

  <main>
    <div class="container">

      <section class="page-hero">
        <h1>Gigs</h1>
        <p class="subtitle">Upcoming jazz concerts across London</p>
      </section>

      <div class="filters" id="date-filters">
        <span class="filter-label">When</span>
        <button class="date-btn active" data-range="all">All upcoming</button>
        <button class="date-btn" data-range="today">Tonight</button>
        <button class="date-btn" data-range="tomorrow">Tomorrow</button>
        <button class="date-btn" data-range="week">This week</button>
        <button class="date-btn" data-range="weekend">Weekend</button>
      </div>

      <div class="filters" id="zone-filters">
        <span class="filter-label">Zone</span>
        <button class="filter-btn active" data-zone="all">All</button>
        <button class="filter-btn" data-zone="Central">Central</button>
        <button class="filter-btn" data-zone="North">North</button>
        <button class="filter-btn" data-zone="East">East</button>
        <button class="filter-btn" data-zone="South West">South West</button>
        <button class="filter-btn" data-zone="South East">South East</button>
        <button class="filter-btn" data-zone="West">West</button>
      </div>

      <div class="filters">
        <span class="filter-label">Genre</span>
        <select class="filter-select" id="genre-filter">
          <option value="all">All genres</option>
        </select>
        <span class="filter-label" style="margin-left:1rem">Format</span>
        <select class="filter-select" id="format-filter">
          <option value="all">All formats</option>
        </select>
        <label style="font-size:0.75rem;margin-left:1rem;cursor:pointer">
          <input type="checkbox" id="picks-only" style="margin-right:0.3rem">
          Editor's picks only
        </label>
      </div>

      <div class="result-count" id="result-count"></div>

      <div class="listings" id="listings">
        <div class="loading">Loading</div>
      </div>

    </div>
  </main>

  <div id="footer"></div>

  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script>
    document.getElementById('header').innerHTML = renderHeader('gigs.html');
    document.getElementById('footer').innerHTML = renderFooter();

    let allGigs = [];
    let activeRange  = 'all';
    let activeZone   = 'all';
    let activeGenre  = 'all';
    let activeFormat = 'all';
    let picksOnly    = false;

    async function init() {
      document.body.classList.add('js-loaded');
      const gigs = await fetchData('gigs');
      const t = today();
      allGigs = gigs
        .filter(g => g.date >= t)
        .filter(g => !g.hidden)  // respect hidden flag
        .filter(g => (g.price_from || '').toLowerCase() !== 'free')  // free entry belongs on the free page
        .sort((a, b) => {
          if (a.date !== b.date) return a.date.localeCompare(b.date);
          // Editors picks first within each day
          const ap = a.editors_pick === true || a.editors_pick === 'TRUE';
          const bp = b.editors_pick === true || b.editors_pick === 'TRUE';
          return bp - ap;
        });

      // Populate genre dropdown
      const genres = uniqueValues(allGigs, 'genre_tier1');
      const genreSelect = document.getElementById('genre-filter');
      genres.forEach(g => {
        const opt = document.createElement('option');
        opt.value = g; opt.textContent = g;
        genreSelect.appendChild(opt);
      });

      // Populate format dropdown
      const formats = uniqueValues(allGigs, 'format_tags');
      const formatSelect = document.getElementById('format-filter');
      formats.forEach(f => {
        const opt = document.createElement('option');
        opt.value = f; opt.textContent = f;
        formatSelect.appendChild(opt);
      });

      render();
    }

    function getFiltered() {
      const t = today();
      return allGigs.filter(g => {
        // Date range
        if (activeRange === 'today'    && !isToday(g.date))    return false;
        if (activeRange === 'tomorrow' && !isTomorrow(g.date)) return false;
        if (activeRange === 'week'     && !isThisWeek(g.date)) return false;
        if (activeRange === 'weekend') {
          const d = new Date(g.date + 'T12:00:00');
          const dow = d.getDay();
          if (dow !== 5 && dow !== 6 && dow !== 0) return false;
        }
        // Zone
        if (activeZone !== 'all' && g.zone !== activeZone) return false;
        // Genre
        if (activeGenre !== 'all' && g.genre_tier1 !== activeGenre) return false;
        // Format
        if (activeFormat !== 'all' && g.format_tags !== activeFormat) return false;
        // Picks
        if (picksOnly && g.editors_pick !== true && g.editors_pick !== 'TRUE') return false;
        return true;
      });
    }

    function render() {
      const filtered = getFiltered();
      const countEl = document.getElementById('result-count');
      countEl.textContent = `${filtered.length} gig${filtered.length !== 1 ? 's' : ''}`;

      const listingsEl = document.getElementById('listings');
      if (!filtered.length) {
        showEmpty(listingsEl, 'No gigs found for these filters.');
        return;
      }

      const grouped = groupByDate(filtered);
      const html = Object.entries(grouped)
        .sort(([a], [b]) => a.localeCompare(b))
        .map(([date, gigs]) => {
          const label = isToday(date) ? 'Tonight' : isTomorrow(date) ? 'Tomorrow' : '';
          const ranked = sortGigsWithinDay(gigs);
          return `
            <div class="date-group">
              <div class="date-group-header">
                <div class="date-group-day">${formatDate(date)}</div>
                ${label ? `<div class="date-group-meta">${label}</div>` : ''}
              </div>
              ${ranked.map(renderGigCard).join('')}
            </div>`;
        }).join('');

      listingsEl.innerHTML = html;

      // Inject Schema.org MusicEvent structured data
      const existing = document.getElementById('schema-events');
      if (existing) existing.remove();
      const schema = {
        "@context": "https://schema.org",
        "@type": "ItemList",
        "name": "Jazz Gigs in London",
        "description": "Upcoming jazz concerts across London",
        "url": "https://londonjazzlist.co.uk/gigs.html",
        "itemListElement": filtered.slice(0, 50).map((g, i) => ({
          "@type": "ListItem",
          "position": i + 1,
          "item": {
            "@type": "MusicEvent",
            "name": g.artist_name,
            "startDate": g.date + (g.start_time ? 'T' + normaliseTime(g.start_time) : ''),
            "location": {
              "@type": "MusicVenue",
              "name": g.venue_name,
              "address": {
                "@type": "PostalAddress",
                "addressLocality": g.neighbourhood || "London",
                "addressRegion": "London",
                "addressCountry": "GB"
              }
            },
            "url": g.ticket_url || "https://londonjazzlist.co.uk/gigs.html",
            "description": g.description || "",
            "offers": g.price_from ? {
              "@type": "Offer",
              "price": g.price_from.replace(/[^0-9.]/g, '') || "0",
              "priceCurrency": "GBP",
              "availability": "https://schema.org/InStock",
              "url": g.ticket_url || "https://londonjazzlist.co.uk/gigs.html"
            } : undefined,
            "performer": {
              "@type": "MusicGroup",
              "name": g.artist_name
            },
            "organizer": {
              "@type": "Organization",
              "name": g.venue_name
            }
          }
        }))
      };
      const scriptEl = document.createElement('script');
      scriptEl.id = 'schema-events';
      scriptEl.type = 'application/ld+json';
      scriptEl.textContent = JSON.stringify(schema);
      document.head.appendChild(scriptEl);
    }

    function normaliseTime(t) {
      // Convert "7.45pm" or "7:45pm" to "19:45:00"
      if (!t) return '00:00:00';
      const m = t.match(/(\d{1,2})[.:]?(\d{2})\s*(am|pm)?/i);
      if (!m) return '00:00:00';
      let h = parseInt(m[1]);
      const min = m[2] || '00';
      const ampm = (m[3] || '').toLowerCase();
      if (ampm === 'pm' && h < 12) h += 12;
      if (ampm === 'am' && h === 12) h = 0;
      return `${String(h).padStart(2,'0')}:${min}:00`;
    }



    // ── Event listeners ───────────────────────────────────────

    document.querySelectorAll('.date-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeRange = btn.dataset.range;
        render();
      });
    });

    document.querySelectorAll('[data-zone]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-zone]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeZone = btn.dataset.zone;
        render();
      });
    });

    document.getElementById('genre-filter').addEventListener('change', e => {
      activeGenre = e.target.value;
      render();
    });

    document.getElementById('format-filter').addEventListener('change', e => {
      activeFormat = e.target.value;
      render();
    });

    document.getElementById('picks-only').addEventListener('change', e => {
      picksOnly = e.target.checked;
      render();
    });

    init();
  </script>
</body>
</html>
