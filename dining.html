<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jazz Dining London — Restaurants with Live Jazz | The London Jazz List</title>
  <meta name="description" content="London restaurants and bars with regular live jazz — from Boisdale and Quaglino's to Brunswick House, Below Stone Nest, Toulouse Lautrec and the Bull's Head Barnes.">
  <meta name="keywords" content="restaurants with live jazz london, jazz dining london, live jazz restaurant london, jazz bar london, jazz night out london, boisdale london jazz, quaglinos jazz, brunswick house jazz, toulouse lautrec jazz brixton, jazz date night london, live music dinner london">
  <link rel="canonical" href="https://londonjazzlist.co.uk/dining.html">

  <!-- Open Graph -->
  <meta property="og:title" content="Jazz Dining London — Restaurants with Live Jazz | The London Jazz List">
  <meta property="og:description" content="London restaurants and bars with regular live jazz — from Boisdale and Quaglino's to Brunswick House, Below Stone Nest, Toulouse Lautrec and the Bull's Head Barnes.">
  <meta property="og:url" content="https://londonjazzlist.co.uk/dining.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="The London Jazz List">
  <meta property="og:locale" content="en_GB">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Jazz Dining London — Restaurants with Live Jazz | The London Jazz List">
  <meta name="twitter:description" content="London restaurants and bars with regular live jazz — from Boisdale and Quaglino's to Brunswick House, Below Stone Nest, Toulouse Lautrec and the Bull's Head Barnes.">

  <!-- Geo -->
  <meta name="geo.region" content="GB-LND">
  <meta name="geo.placename" content="London">

  <link rel="stylesheet" href="css/style.css">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ItemList",
    "name": "London Jazz Events",
    "description": "Upcoming jazz events in London",
    "url": "https://londonjazzlist.co.uk/gigs.html"
  }
  </script>

</head>
<body>

  <div id="header"></div>

  <main>
    <div class="container">

      <section class="page-hero">
        <h1>Jazz Dining</h1>
        <p class="subtitle">Restaurants, hotel dining rooms and bars with regular live jazz</p>
      </section>

      <div class="filters">
        <span class="filter-label">Zone</span>
        <button class="filter-btn active" data-zone="all">All</button>
        <button class="filter-btn" data-zone="Central">Central</button>
        <button class="filter-btn" data-zone="North">North</button>
        <button class="filter-btn" data-zone="East">East</button>
        <button class="filter-btn" data-zone="South West">South West</button>
        <button class="filter-btn" data-zone="South East">South East</button>
        <button class="filter-btn" data-zone="West">West</button>
        <button class="filter-btn" data-zone="West / South West">West / SW</button>
      </div>

      <div class="filters">
        <span class="filter-label">Night</span>
        <button class="filter-btn active" data-day="all">Any night</button>
        <button class="filter-btn" data-day="Wednesday">Wed</button>
        <button class="filter-btn" data-day="Thursday">Thu</button>
        <button class="filter-btn" data-day="Friday">Fri</button>
        <button class="filter-btn" data-day="Saturday">Sat</button>
        <button class="filter-btn" data-day="Sunday">Sun</button>
      </div>

      <div class="filters">
        <label style="font-size:0.75rem;cursor:pointer">
          <input type="checkbox" id="free-only" style="margin-right:0.3rem">
          Free with dining only
        </label>
        <label style="font-size:0.75rem;cursor:pointer;margin-left:1rem">
          <input type="checkbox" id="no-booking" style="margin-right:0.3rem">
          No reservation required
        </label>
      </div>

      <div class="result-count" id="result-count"></div>
      <div class="brunch-grid" id="dining-grid"></div>

    </div>
  </main>

  <div id="footer"></div>

  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script>
    document.getElementById('header').innerHTML = renderHeader('dining.html');
    document.getElementById('footer').innerHTML = renderFooter();

    let allDining = [];
    let activeZone = 'all';
    let activeDay  = 'all';
    let freeOnly   = false;
    let noBooking  = false;

    async function init() {
      allDining = await fetchData('dining');
      render();
    }

    function getFiltered() {
      return allDining.filter(d => {
        if (activeZone !== 'all' && d.zone !== activeZone) return false;
        if (activeDay !== 'all' && !d.days_of_week.includes(activeDay)) return false;
        if (freeOnly && !d.price_type.includes('Free')) return false;
        if (noBooking && d.reservation_required === true) return false;
        return true;
      })
        .sort((a, b) => {
          const ta = a.music_quality_tier || 2;
          const tb = b.music_quality_tier || 2;
          if (ta !== tb) return ta - tb;
          return (a.venue_name || '').localeCompare(b.venue_name || '');
        });
    }

    function render() {
      const filtered = getFiltered();
      document.getElementById('result-count').textContent =
        `${filtered.length} venue${filtered.length !== 1 ? 's' : ''}`;

      const grid = document.getElementById('dining-grid');
      if (!filtered.length) {
        showEmpty(grid, 'No venues found for these filters.');
        return;
      }
      grid.innerHTML = filtered.map(renderDiningCard).join('');
    }

    document.querySelectorAll('[data-zone]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-zone]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeZone = btn.dataset.zone;
        render();
      });
    });

    document.querySelectorAll('[data-day]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-day]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeDay = btn.dataset.day;
        render();
      });
    });

    document.getElementById('free-only').addEventListener('change', e => { freeOnly = e.target.checked; render(); });
    document.getElementById('no-booking').addEventListener('change', e => { noBooking = e.target.checked; render(); });

    init();
  </script>
</body>
</html>
