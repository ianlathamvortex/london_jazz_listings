<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jazz Festivals London 2026 | The London Jazz List</title>
  <meta name="description" content="London jazz festivals 2026 — EFG London Jazz Festival, Battersea Jazz Festival, Jazz on Wick, Meltdown, De Beauvoir Jazz Festival and the Serious Promotions summer series.">
  <meta name="keywords" content="london jazz festival 2026, efg london jazz festival, battersea jazz festival, jazz on wick hackney, meltdown festival jazz, de beauvoir jazz festival, serious promotions jazz london, summer jazz london 2026, jazz festival london">
  <link rel="canonical" href="https://londonjazzlist.co.uk/festivals.html">

  <!-- Open Graph -->
  <meta property="og:title" content="Jazz Festivals London 2026 | The London Jazz List">
  <meta property="og:description" content="London jazz festivals 2026 — EFG London Jazz Festival, Battersea Jazz Festival, Jazz on Wick, Meltdown, De Beauvoir Jazz Festival and the Serious Promotions summer series.">
  <meta property="og:url" content="https://londonjazzlist.co.uk/festivals.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="The London Jazz List">
  <meta property="og:locale" content="en_GB">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Jazz Festivals London 2026 | The London Jazz List">
  <meta name="twitter:description" content="London jazz festivals 2026 — EFG London Jazz Festival, Battersea Jazz Festival, Jazz on Wick, Meltdown, De Beauvoir Jazz Festival and the Serious Promotions summer series.">

  <!-- Geo -->
  <meta name="geo.region" content="GB-LND">
  <meta name="geo.placename" content="London">

  <link rel="stylesheet" href="css/style.css">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ItemList",
    "name": "London Jazz Events",
    "description": "Upcoming jazz events in London",
    "url": "https://londonjazzlist.co.uk/gigs.html"
  }
  </script>

</head>
<body>

  <div id="header"></div>

  <main>
    <div class="container">

      <section class="page-hero">
        <h1>Festivals</h1>
        <p class="subtitle">Multi-day jazz events across London</p>
      </section>

      <div id="festivals-list" class="listings">
        <div class="loading">Loading</div>
      </div>

    </div>
  </main>

  <div id="footer"></div>

  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script>
    document.getElementById('header').innerHTML = renderHeader('festivals.html');
    document.getElementById('footer').innerHTML = renderFooter();

    async function init() {
      const festivals = await fetchData('festivals');
      const t = today();
      const upcoming = festivals
        .filter(f => !f.end_date || f.end_date >= t)
        .sort((a, b) => (a.start_date || '').localeCompare(b.start_date || ''));

      const el = document.getElementById('festivals-list');

      if (!upcoming.length) {
        showEmpty(el, 'No upcoming festivals listed yet.');
        return;
      }

      el.innerHTML = upcoming.map(f => {
        const dateRange = f.start_date && f.end_date
          ? `${formatDateShort(f.start_date)} – ${formatDateShort(f.end_date)}`
          : f.start_date ? formatDate(f.start_date) : '';

        const isActive = f.start_date <= t && f.end_date >= t;
        const isFree = f.ticketed === false || f.ticketed === 'FALSE';

        return `
          <div class="gig-card ${isActive ? 'editors-pick' : ''}">
            <div class="gig-main">
              <div class="gig-artist">${esc(f.festival_name)}</div>
              <div class="gig-venue">
                <span class="gig-venue-name">${esc(f.venue_summary || '')}</span>
                ${f.zone ? ` · ${esc(f.zone)}` : ''}
              </div>
              ${f.description ? `<div class="gig-description">${esc(f.description)}</div>` : ''}
              <div class="gig-tags">
                ${isActive ? '<span class="tag tag-special">On now</span>' : ''}
                ${isFree ? '<span class="tag tag-free">Free</span>' : ''}
              </div>
            </div>
            <div class="gig-aside">
              <div class="gig-time">${esc(dateRange)}</div>
              ${f.price_range ? `<div class="gig-price">${esc(f.price_range)}</div>` : ''}
              ${f.website ? `<a href="${esc(f.website)}" target="_blank" rel="noopener" class="gig-ticket-link">More info →</a>` : ''}
            </div>
          </div>`;
      }).join('');
    }

    init();
  </script>
</body>
</html>
